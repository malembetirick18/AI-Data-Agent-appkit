bundle:
  name: my-data-ai-assistant

variables:
  DATABRICKS_GENIE_SPACE_ID:
    description: "Databricks Genie Space ID"
    default: "01f1222b08a513ec94de27be8a9112b7"
  SECRET_SCOPE:
    description: "Databricks secret scope name"
    default: "my-data-ai-assistant"

resources:
  apps:
    app:
      name: "my-data-ai-assistant"
      description: "A Databricks App powered by AppKit"
      source_code_path: ./
      user_api_scopes:
        - dashboards.genie
      resources:
        - name: "genie-space"
          description: "Genie Space for AI-powered data queries"
          genie_space:
            name: "genie-space"
            space_id: ${var.DATABRICKS_GENIE_SPACE_ID}
            permission: "CAN_RUN"
        - name: "aggrid-license-key"
          description: "AG Grid license key secret"
          secret:
            scope: ${var.SECRET_SCOPE}
            key: aggrid-license-key
            permission: "READ"
        - name: "azure-api-base"
          description: "Azure OpenAI API base URL"
          secret:
            scope: ${var.SECRET_SCOPE}
            key: azure-api-base
            permission: "READ"
        - name: "azure-api-key"
          description: "Azure OpenAI API key"
          secret:
            scope: ${var.SECRET_SCOPE}
            key: azure-api-key
            permission: "READ"

targets:
  default:
    default: true
    workspace:
      host: https://adb-5051745983841897.17.azuredatabricks.net
